version: "3.8"

# NOTE: The backend repo (../dissertation) has the PRIMARY
# docker-compose.yml that includes postgres, backend, AND
# the frontend.  This file is a STANDALONE alternative for
# frontend-only development/testing.

services:
  # Build from the sibling backend directory (../dissertation).
  # Or switch to a pre-built image by commenting out build: and
  # uncommenting image:.
  backend:
    build:
      context: ../dissertation
      dockerfile: Dockerfile
    # image: msadetector-backend:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

