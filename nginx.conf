server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Serve static files with caching (hashed filenames)
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy /api requests to the backend
    # Using a variable so Nginx resolves DNS at request-time, not startup.
    # This prevents Nginx from crashing if the backend starts after the frontend.
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large file uploads (up to 500MB to match backend)
        client_max_body_size 500m;

        # Timeouts for long-running analysis jobs
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # Angular HTML5 routing — fall back to index.html for all unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

