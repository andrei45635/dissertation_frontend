<div class="health-score" [class]="getScoreClass()">
  <div class="score-circle">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" class="bg-circle"/>
      <circle cx="50" cy="50" r="45" class="progress-circle" [style.strokeDashoffset]="getStrokeDashoffset()"/>
    </svg>
    <div class="score-value">{{ score }}</div>
  </div>
  <div class="score-label">Health Score</div>
  <div class="score-description">{{ getScoreDescription() }}</div>
</div>
