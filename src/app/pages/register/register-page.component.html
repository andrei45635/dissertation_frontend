<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <span class="logo-icon">M</span>
      </div>
      <h1 class="auth-title">Create an account</h1>
      <p class="auth-subtitle">Get started with MSA Detector</p>
    </div>

    @if (errorMessage) {
      <div class="error-message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="register()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input
          id="name"
          type="text"
          class="form-input"
          [(ngModel)]="name"
          name="name"
          placeholder="John Doe"
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-input"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          [(ngModel)]="password"
          name="password"
          placeholder="At least 6 characters"
          autocomplete="new-password"
        />
        @if (password && password.length < 6) {
          <span class="field-hint">Password must be at least 6 characters</span>
        }
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="!canSubmit"
      >
        @if (isLoading) {
          <span class="spinner"></span>
          Creating account...
        } @else {
          Create Account
        }
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login" class="auth-link">Sign in</a>
    </p>
  </div>
</div>
